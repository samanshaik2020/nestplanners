<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio Forma — Architectural Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #fafaf8;
    --off-white: #f2f0ec;
    --stone: #c8c4bc;
    --graphite: #5a5650;
    --ink: #1a1814;
    --accent: #8b7355;
  }

  body {
    background: var(--white);
    font-family: 'DM Mono', monospace;
    overflow-x: hidden;
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    min-height: 600px;
    background: var(--white);
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  #canvas-container {
    position: absolute;
    inset: 0;
  }

  canvas { display: block; }

  /* ── Overlay text ── */
  .overlay {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 8vw;
    pointer-events: none;
    max-width: 560px;
  }

  .tag {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.9s 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(52px, 6vw, 88px);
    line-height: 1.04;
    color: var(--ink);
    opacity: 0;
    transform: translateY(24px);
    animation: fadeUp 1s 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  .headline em {
    font-style: italic;
    color: var(--accent);
  }

  .sub {
    margin-top: 28px;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--graphite);
    line-height: 1.8;
    max-width: 340px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.9s 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  .cta-row {
    margin-top: 48px;
    display: flex;
    gap: 20px;
    align-items: center;
    pointer-events: all;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.9s 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  .btn-primary {
    padding: 13px 32px;
    background: var(--ink);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
  }
  .btn-primary:hover { background: var(--accent); transform: translateY(-1px); }

  .btn-outline {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--graphite);
    background: none;
    border: none;
    cursor: pointer;
    border-bottom: 1px solid var(--stone);
    padding-bottom: 2px;
    transition: color 0.3s;
  }
  .btn-outline:hover { color: var(--ink); }

  /* ── Corner marks ── */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border-color: var(--stone);
    border-style: solid;
    opacity: 0;
    animation: fadeIn 1s 1.4s ease forwards;
  }
  .corner-tl { top: 32px; left: 32px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 32px; right: 32px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 32px; left: 32px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 32px; right: 32px; border-width: 0 1px 1px 0; }

  /* ── Ruler ── */
  .ruler-v {
    position: absolute;
    right: 52px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    animation: fadeIn 1.2s 1.6s ease forwards;
  }
  .tick { width: 14px; height: 1px; background: var(--stone); }
  .tick-l { width: 22px; }

  /* ── Measurement label ── */
  .measure-label {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--stone);
    opacity: 0;
    animation: fadeIn 1s 1.8s ease forwards;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .measure-line {
    width: 60px; height: 1px; background: var(--stone);
    position: relative;
  }
  .measure-line::before, .measure-line::after {
    content: '';
    position: absolute;
    top: -3px;
    width: 1px;
    height: 7px;
    background: var(--stone);
  }
  .measure-line::before { left: 0; }
  .measure-line::after  { right: 0; }

  /* ── Scroll hint ── */
  .scroll-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeIn 1s 2s ease forwards;
  }
  .scroll-hint span { font-size: 9px; letter-spacing: 0.2em; color: var(--stone); text-transform: uppercase; }
  .scroll-line {
    width: 1px; height: 36px;
    background: linear-gradient(to bottom, var(--stone), transparent);
    animation: scrollAnim 2s 2.5s ease-in-out infinite;
  }

  /* ── Blueprint papers ── */
  .bp-paper {
    position: absolute;
    border: 1px solid rgba(139,115,85,0.14);
    background: rgba(250,250,248,0.55);
    opacity: 0;
    animation: bpFloat var(--dur) var(--delay) ease-in-out infinite;
    overflow: hidden;
  }

  /* ── Keyframes ── */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes scrollAnim {
    0%  { transform: scaleY(0); transform-origin: top; }
    50% { transform: scaleY(1); transform-origin: top; }
    51% { transform: scaleY(1); transform-origin: bottom; }
    100%{ transform: scaleY(0); transform-origin: bottom; }
  }
  @keyframes bpFloat {
    0%   { opacity: 0; transform: translateY(0px) rotate(var(--rot)); }
    10%  { opacity: 0.45; }
    90%  { opacity: 0.45; }
    100% { opacity: 0; transform: translateY(-45px) rotate(calc(var(--rot) + 5deg)); }
  }

  @media (max-width: 768px) {
    .overlay { padding: 0 6vw; max-width: 100%; }
    .headline { font-size: clamp(40px, 10vw, 58px); }
    .ruler-v { display: none; }
  }
</style>
</head>
<body>

<section class="hero">

  <!-- 3D Canvas -->
  <div id="canvas-container"></div>

  <!-- Blueprint floating papers (created by JS) -->
  <div id="papers"></div>

  <!-- Corner marks -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Ruler ticks -->
  <div class="ruler-v">
    <div class="tick tick-l"></div>
    <div class="tick"></div>
    <div class="tick"></div>
    <div class="tick"></div>
    <div class="tick tick-l"></div>
    <div class="tick"></div>
    <div class="tick"></div>
    <div class="tick"></div>
    <div class="tick tick-l"></div>
  </div>

  <!-- Measurement label -->
  <div class="measure-label">
    <span>12.4 M</span>
    <div class="measure-line"></div>
  </div>

  <!-- Text overlay -->
  <div class="overlay">
    <div class="tag">Studio Forma — 2025</div>
    <h1 class="headline">Where <em>Form</em><br>Meets Vision</h1>
    <p class="sub">
      We translate architectural concepts into living spaces — precision-crafted,
      humanly scaled, and built to endure.
    </p>
    <div class="cta-row">
      <button class="btn-primary">View Projects</button>
      <button class="btn-outline">Our Process</button>
    </div>
  </div>

  <!-- Scroll hint -->
  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>

</section>

<!-- Dummy scroll content -->
<div style="height:200vh;background:var(--white);display:flex;align-items:flex-start;padding:80px 8vw;">
  <p style="font-family:'DM Mono',monospace;font-size:11px;color:#c8c4bc;letter-spacing:0.1em;">SCROLL DOWN TO EXPERIENCE CAMERA ZOOM</p>
</div>

<script>
/* ════════════════════════════════════════════════════════
   THREE.JS ARCHITECTURAL HERO — VANILLA
   ════════════════════════════════════════════════════════ */

(function() {
  const container = document.getElementById('canvas-container');
  const W = container.clientWidth;
  const H = container.clientHeight;

  /* ── Renderer ── */
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.setSize(W, H);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  container.appendChild(renderer.domElement);

  /* ── Scene ── */
  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#fafaf8');

  /* ── Camera ── */
  const camera = new THREE.PerspectiveCamera(38, W / H, 0.1, 100);
  camera.position.set(3.5, 3, 5);
  camera.lookAt(0, 0.3, 0);

  /* ── Mouse + scroll state ── */
  const mouse = { x: 0, y: 0 };
  let scrollY = 0;
  const camTarget = new THREE.Vector3(3.5, 3, 5);

  window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / W - 0.5) * 2;
    mouse.y = -(e.clientY / H - 0.5) * 2;
  });
  window.addEventListener('scroll', () => { scrollY = window.scrollY; });

  /* ══════════ MATERIALS ══════════ */
  const clayMat = new THREE.MeshStandardMaterial({
    color: 0xe8e4de,
    roughness: 0.88,
    metalness: 0.02,
  });
  const darkMat = new THREE.MeshStandardMaterial({
    color: 0xbab6b0,
    roughness: 0.95,
    metalness: 0,
  });
  const glassMat = new THREE.MeshStandardMaterial({
    color: 0xc8d4dc,
    roughness: 0.1,
    metalness: 0.3,
    transparent: true,
    opacity: 0.55,
  });
  const wireMat = new THREE.MeshBasicMaterial({
    color: 0x8b7355,
    wireframe: true,
    transparent: true,
    opacity: 0.18,
  });

  /* ══════════ HELPERS ══════════ */
  function makeMesh(geo, mat, castShadow, receiveShadow) {
    const m = new THREE.Mesh(geo, mat);
    if (castShadow) m.castShadow = true;
    if (receiveShadow) m.receiveShadow = true;
    return m;
  }

  /* ══════════ HOUSE GROUP ══════════ */
  const houseGroup = new THREE.Group();

  // Main body
  houseGroup.add(makeMesh(new THREE.BoxGeometry(2.4, 1.4, 1.6), clayMat, true, false));

  // Recessed entry
  const entry = makeMesh(new THREE.BoxGeometry(0.7, 1.04, 0.04), darkMat, true, false);
  entry.position.set(0, -0.18, 0.82);
  houseGroup.add(entry);

  // Front glass panels
  [-0.6, 0.6].forEach(x => {
    const p = makeMesh(new THREE.BoxGeometry(0.48, 0.9, 0.02), glassMat, true, false);
    p.position.set(x, 0, 0.81);
    houseGroup.add(p);
  });

  // Roof (pyramid via ConeGeometry rotated)
  const roofGeo = new THREE.ConeGeometry(1.44, 0.78, 4);
  roofGeo.rotateY(Math.PI / 4);
  const roof = makeMesh(roofGeo, clayMat, true, false);
  roof.position.set(0, 0.95, 0);
  houseGroup.add(roof);

  // Roof overhang
  const overhang = makeMesh(new THREE.BoxGeometry(2.6, 0.06, 1.78), darkMat, true, false);
  overhang.position.set(0, 0.72, 0);
  houseGroup.add(overhang);

  // Chimney
  const chimney = makeMesh(new THREE.BoxGeometry(0.22, 0.52, 0.22), clayMat, true, false);
  chimney.position.set(0.7, 1.45, -0.25);
  houseGroup.add(chimney);
  const chimneyTop = makeMesh(new THREE.BoxGeometry(0.27, 0.05, 0.27), darkMat, false, false);
  chimneyTop.position.set(0.7, 1.73, -0.25);
  houseGroup.add(chimneyTop);

  // Side windows
  [[1.21], [-1.21]].forEach(([x]) => {
    const win = makeMesh(new THREE.BoxGeometry(0.02, 0.55, 0.8), glassMat, false, false);
    win.position.set(x, 0.1, 0.2);
    houseGroup.add(win);
  });

  // Plinth
  const plinth = makeMesh(new THREE.BoxGeometry(2.6, 0.12, 1.78), darkMat, false, true);
  plinth.position.set(0, -0.76, 0);
  houseGroup.add(plinth);

  // Steps
  for (let i = 0; i < 3; i++) {
    const step = makeMesh(new THREE.BoxGeometry(0.78 + i * 0.12, 0.08, 0.13), darkMat, false, true);
    step.position.set(0, -0.68 - i * 0.08, 0.84 + i * 0.14);
    houseGroup.add(step);
  }

  // Wireframe overlay
  const wireGroup = new THREE.Group();
  const wGeos = [
    { g: new THREE.BoxGeometry(2.4, 1.4, 1.6), p: [0,0,0] },
    { g: new THREE.BoxGeometry(2.6, 0.12, 1.78), p: [0,-0.76,0] },
  ];
  wGeos.forEach(d => {
    const wm = new THREE.Mesh(d.g, wireMat.clone());
    wm.position.set(...d.p);
    wireGroup.add(wm);
  });
  houseGroup.add(wireGroup);

  /* ══════════ ENTRANCE ANIMATION GROUP ══════════ */
  const entranceGroup = new THREE.Group();
  entranceGroup.position.y = -3;  // start below
  entranceGroup.add(houseGroup);
  scene.add(entranceGroup);

  /* ══════════ BLUEPRINT GRID ══════════ */
  const gridGroup = new THREE.Group();
  gridGroup.position.y = -0.82;

  // Base plane
  const planeGeo = new THREE.PlaneGeometry(10, 10);
  const planeMat = new THREE.MeshBasicMaterial({
    color: 0xf5f0e8, transparent: true, opacity: 0, side: THREE.DoubleSide
  });
  const plane = new THREE.Mesh(planeGeo, planeMat);
  plane.rotation.x = -Math.PI / 2;
  plane.receiveShadow = true;
  gridGroup.add(plane);

  // Grid lines
  const lineMat = () => new THREE.LineBasicMaterial({ color: 0x8b7355, transparent: true, opacity: 0 });

  const allLines = [];
  for (let i = -5; i <= 5; i++) {
    [[i,0,-5,i,0,5],[- 5,0,i,5,0,i]].forEach(pts => {
      const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(pts[0],pts[1],pts[2]),
        new THREE.Vector3(pts[3],pts[4],pts[5])
      ]);
      const line = new THREE.Line(geo, lineMat());
      gridGroup.add(line);
      allLines.push(line);
    });
  }

  // Circles
  for (let r = 1; r <= 4; r++) {
    const pts = [];
    for (let j = 0; j <= 64; j++) {
      const a = (j/64)*Math.PI*2;
      pts.push(new THREE.Vector3(Math.cos(a)*r, 0, Math.sin(a)*r));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const line = new THREE.Line(geo, lineMat());
    gridGroup.add(line);
    allLines.push(line);
  }

  scene.add(gridGroup);

  /* ══════════ MEASUREMENT LINES ══════════ */
  const measureGroup = new THREE.Group();
  const measMat = new THREE.LineBasicMaterial({ color: 0x8b7355, transparent: true, opacity: 0 });
  const measureLines = [];

  [
    [[- 1.4,0.1,1.1],[1.4,0.1,1.1]],
    [[1.5,-0.7,-0.9],[1.5,0.7,-0.9]],
    [[-1.5,-0.7,-0.9],[-1.5,0.7,-0.9]],
  ].forEach(pts => {
    const geo = new THREE.BufferGeometry().setFromPoints(pts.map(p => new THREE.Vector3(...p)));
    const mat = new THREE.LineBasicMaterial({ color: 0x8b7355, transparent: true, opacity: 0 });
    const line = new THREE.Line(geo, mat);
    measureGroup.add(line);
    measureLines.push(line.material);
  });
  scene.add(measureGroup);

  /* ══════════ SHADOW PLANE ══════════ */
  const shadowPlaneGeo = new THREE.PlaneGeometry(10, 10);
  const shadowPlaneMat = new THREE.ShadowMaterial({ opacity: 0.3 });
  const shadowPlane = new THREE.Mesh(shadowPlaneGeo, shadowPlaneMat);
  shadowPlane.rotation.x = -Math.PI / 2;
  shadowPlane.position.y = -0.82;
  shadowPlane.receiveShadow = true;
  scene.add(shadowPlane);

  /* ══════════ LIGHTS ══════════ */
  scene.add(new THREE.AmbientLight(0xfff5ea, 1.4));

  const dirLight = new THREE.DirectionalLight(0xfff8f0, 2.5);
  dirLight.position.set(6, 8, 4);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(2048, 2048);
  dirLight.shadow.camera.left = -6;
  dirLight.shadow.camera.right = 6;
  dirLight.shadow.camera.top = 6;
  dirLight.shadow.camera.bottom = -6;
  dirLight.shadow.camera.far = 30;
  dirLight.shadow.bias = -0.0005;
  scene.add(dirLight);

  const fillLight = new THREE.DirectionalLight(0xe0eaf5, 0.6);
  fillLight.position.set(-4, 3, -3);
  scene.add(fillLight);

  const rimLight = new THREE.PointLight(0xfff5e8, 0.5, 12);
  rimLight.position.set(0, 4, -3);
  scene.add(rimLight);

  /* ══════════ ANIMATION STATE ══════════ */
  let clock = new THREE.Clock();
  let risen = false;
  let gridVisible = false;

  // Timers
  setTimeout(() => { gridVisible = true; }, 400);
  setTimeout(() => { risen = true; }, 1200);

  /* ══════════ FLOAT oscillation ══════════ */
  let floatOffset = 0;

  /* ══════════ LERP ══════════ */
  function lerp(a, b, t) { return a + (b - a) * t; }

  /* ══════════ ANIMATE ══════════ */
  function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // House rotation
    houseGroup.rotation.y = elapsed * 0.12;

    // Float
    floatOffset = Math.sin(elapsed * 0.6) * 0.12;

    // Entrance rise
    const targetY = risen ? floatOffset : -3;
    if (!risen) {
      // Quick spring up
      entranceGroup.position.y = lerp(entranceGroup.position.y, targetY, 0.025);
    } else {
      entranceGroup.position.y = lerp(entranceGroup.position.y, targetY, 0.04);
    }

    // Grid fade in
    const gridTargetOp = gridVisible ? 0.55 : 0;
    planeMat.opacity = lerp(planeMat.opacity, gridTargetOp, 0.04);
    allLines.forEach(l => {
      l.material.opacity = lerp(l.material.opacity, gridVisible ? 0.45 : 0, 0.04);
    });

    // Measure lines
    const mTargetOp = risen ? 0.4 : 0;
    measureLines.forEach(m => {
      m.opacity = lerp(m.opacity, mTargetOp, 0.05);
    });

    // Wire overlay fade
    wireGroup.children.forEach(c => {
      c.material.opacity = lerp(c.material.opacity, risen ? 0.13 : 0.4, 0.03);
    });

    // Camera parallax + scroll zoom
    const scrollFactor = 1 + scrollY * 0.0004;
    camTarget.set(3.5 + mouse.x * 0.6, 3 + mouse.y * 0.4, 5 * scrollFactor);
    camera.position.lerp(camTarget, 0.05);
    camera.lookAt(0, 0.3, 0);

    renderer.render(scene, camera);
  }

  animate();

  /* ══════════ RESIZE ══════════ */
  window.addEventListener('resize', () => {
    const W2 = container.clientWidth;
    const H2 = container.clientHeight;
    camera.aspect = W2 / H2;
    camera.updateProjectionMatrix();
    renderer.setSize(W2, H2);
  });

  /* ══════════ BLUEPRINT FLOATING PAPERS ══════════ */
  const papersContainer = document.getElementById('papers');
  papersContainer.style.position = 'absolute';
  papersContainer.style.inset = '0';
  papersContainer.style.pointerEvents = 'none';
  papersContainer.style.overflow = 'hidden';

  for (let i = 0; i < 6; i++) {
    const w = 80 + Math.random() * 70;
    const h = 55 + Math.random() * 55;
    const paper = document.createElement('div');
    paper.className = 'bp-paper';
    paper.style.setProperty('--rot', `${-10 + Math.random() * 20}deg`);
    paper.style.setProperty('--dur', `${8 + Math.random() * 7}s`);
    paper.style.setProperty('--delay', `${i * 1.5}s`);
    paper.style.width = w + 'px';
    paper.style.height = h + 'px';
    paper.style.top = `${12 + Math.random() * 65}%`;
    paper.style.left = `${5 + Math.random() * 85}%`;

    // SVG lines inside
    const rows = Math.floor(h / 12);
    const svgLines = Array.from({length: rows}, (_, j) =>
      `<line x1="8" y1="${8+j*12}" x2="${w-8}" y2="${8+j*12}" stroke="#8b7355" stroke-width="0.5"/>`
    ).join('');
    paper.innerHTML = `
      <svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg" style="opacity:0.4;display:block;">
        ${svgLines}
        <rect x="4" y="4" width="${w-8}" height="${h-8}" fill="none" stroke="#8b7355" stroke-width="0.8"/>
        <text x="8" y="${h-10}" font-family="DM Mono,monospace" font-size="6" fill="#8b7355" opacity="0.6">
          ${['PLAN VIEW A-A', 'ELEVATION 01', 'SECTION B-B', 'DETAIL 04', 'ROOF PLAN', 'SITE PLAN'][i]}
        </text>
      </svg>`;
    papersContainer.appendChild(paper);
  }

})();
</script>
</body>
</html>
